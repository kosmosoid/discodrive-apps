name: DiscoDriveFastSync
options:
  bundleIdPrefix: org.discodrive
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    DEVELOPMENT_TEAM: TQD2R45V4P
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1"
    CURRENT_PROJECT_VERSION: "1"
    TARGETED_DEVICE_FAMILY: "1,2"
    DEAD_CODE_STRIPPING: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
targets:
  DiscoDriveFastSync:
    type: application
    platform: iOS
    sources: [Sources, Resources/Assets.xcassets]
    dependencies:
      - framework: ../../daemon/mobile/build/Kfmobile.xcframework
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.discodrive.fastsync
        INFOPLIST_FILE: Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
