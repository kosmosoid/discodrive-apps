name: DiscoDrive
options:
  bundleIdPrefix: org.discodrive
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    DEVELOPMENT_TEAM: TQD2R45V4P
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1"
    CURRENT_PROJECT_VERSION: "1"
    DEAD_CODE_STRIPPING: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
packages:
  DiscoKit:
    path: ../DiscoKit
targets:
  DiscoDrive:
    type: application
    platform: macOS
    sources: [Sources, ../shared, Resources/Assets.xcassets, Resources/AppIcon.icns]
    dependencies:
      - package: DiscoKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.discodrive.app
        INFOPLIST_FILE: Resources/Info.plist
        # App icon — prebuilt AppIcon.icns (CFBundleIconFile); actool truncated the large slots.
        # IMPORTANT: do NOT enable ENABLE_APP_SANDBOX — otherwise AMFI rejects it under a free team.
